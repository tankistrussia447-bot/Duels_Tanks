<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background: linear-gradient(to bottom, #4a614c, #2e3d2f); width:100vw; height:50vh; border-bottom:2px solid #555; }
        .ui { display:flex; justify-content:space-between; width:95vw; padding:8px; font-size:14px; background:rgba(0,0,0,0.5); }
        .controls-layer { display:flex; width:100vw; height:45vh; justify-content:space-between; align-items:center; padding:10px; box-sizing:border-box; }
        
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; }
        .dpad button { background:#444; border:1px solid #666; color:white; border-radius:5px; font-size:18px; }
        .dpad .up { grid-column: 2; grid-row: 1; }
        .dpad .left { grid-column: 1; grid-row: 2; }
        .dpad .right { grid-column: 3; grid-row: 2; }
        .dpad .down { grid-column: 2; grid-row: 3; }

        .actions { display:flex; flex-direction:column; align-items:center; gap:10px; margin-right:20px; }
        #fire { background:#b91c1c; width:85px; height:85px; border-radius:50%; font-size:25px; border:4px solid #7f1d1d; }
        #fire:active { transform: translateY(2px); box-shadow:none; }
        .shop-btn { background:#2563eb; padding:10px 15px; border-radius:8px; border:none; color:white; font-size:16px; }
        
        #shop-panel, #play-btn { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(34,34,34,0.95); border: 2px solid white; padding:20px; width:80vw; z-index:100; text-align:center; }
        #play-btn { background:#22c55e; padding:20px; font-size:24px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="ui">
        <div>💰 <span id="money">0</span> | Раунд: <span id="round">1</span></div>
        <div id="ammo-status">ГОТОВ 🖍️</div>
    </div>
    <canvas id="game" width="400" height="300"></canvas>

    <div class="controls-layer">
        <div class="dpad">
            <button class="up" ontouchstart="setPlayerMove('forward')" ontouchend="stopPlayerMove()">▲</button>
            <button class="left" ontouchstart="setPlayerRotate('left')" ontouchend="stopPlayerRotate()">◀</button>
            <button class="right" ontouchstart="setPlayerRotate('right')" ontouchend="stopPlayerRotate()">▶</button>
            <button class="down" ontouchstart="setPlayerMove('backward')" ontouchend="stopPlayerMove()">▼</button>
        </div>
        <div class="actions">
            <button id="fire" onclick="fire()">🔥</button>
            <button class="shop-btn" onclick="toggleShop()">🛒 МАГАЗИН</button>
        </div>
    </div>

    <div id="shop-panel">
        <h3>АНГАР И УЛУЧШЕНИЯ</h3>
        <button onclick="buyUpgrade('ammo', 20, 200)">Ускор. перезарядка (-0.2с) - 20м</button><br><br>
        <button onclick="buyTank('Comet (Брит)', 50, '#d2b48c')">Comet (Брит) - 50м</button><br><br>
        <button onclick="toggleShop()">ЗАКРЫТЬ</button>
    </div>
    <button id="play-btn" onclick="startNewRound()">НАЧАТЬ РАУНД!</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const TANK_WIDTH = 24, TANK_HEIGHT = 30; // Ширина и высота танка (уменьшено на 40%)
        const MAP_WIDTH = canvas.width, MAP_HEIGHT = canvas.height; // Размеры карты

        let money = 0, round = 1, killsInRound = 0, gameState = 'playing';
        const KILLS_FOR_NEXT_ROUND = 5; // Для тестов 5 убийств, потом можно на 20

        let player = {
            x: MAP_WIDTH / 2 - TANK_WIDTH / 2, y: MAP_HEIGHT - TANK_HEIGHT - 10,
            width: TANK_WIDTH, height: TANK_HEIGHT,
            color: '#2d5a27', // Цвет танка (СССР)
            dir: 0, // 0:вверх, 1:вправо, 2:вниз, 3:влево
            speed: 0, 
            reloading: false, reloadTime: 1500, // Перезарядка
            moveAction: null, // 'forward', 'backward'
            rotateAction: null, // 'left', 'right'
            isHidden: false // Скрыт в кустах
        };

        let bullets = [], enemies = [], wreckage = [], obstacles = [], bushes = [];

        // --- СОЗДАНИЕ КАРТЫ И ОБЪЕКТОВ ---
        function initMap() {
            obstacles = []; bushes = [];
            for(let i=0; i<8; i++) obstacles.push({x: Math.random()*(MAP_WIDTH-40), y: Math.random()*(MAP_HEIGHT-80), w: 30, h: 30, type: 'house', color: '#665544'});
            for(let i=0; i<10; i++) bushes.push({x: Math.random()*(MAP_WIDTH-60), y: Math.random()*(MAP_HEIGHT-80), w: 50, h: 30, type: 'bush'});
        }

        function spawnEnemies() {
            enemies = [];
            let count = Math.min(10, Math.floor(2 + round * 0.5)); 
            for(let i=0; i<count; i++) {
                enemies.push({
                    x: Math.random() * (MAP_WIDTH - TANK_WIDTH), y: Math.random() * (MAP_HEIGHT / 2 - TANK_HEIGHT),
                    width: TANK_WIDTH, height: TANK_HEIGHT,
                    color: '#7c1c1c', // Цвет врага
                    dir: Math.floor(Math.random()*4), // Случайное направление
                    speed: 1 + round*0.1, 
                    reloadTime: 2000 / (1 + round*0.1),
                    lastShotTime: Date.now(),
                    moveAction: null, rotateAction: null,
                    isHidden: false,
                    lastActionTime: Date.now(),
                    targetX: player.x, targetY: player.y // Для AI
                });
            }
        }

        // --- КОЛЛИЗИИ ---
        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
        }

        function getCollidableObjects(tank) {
            let others = [];
            obstacles.forEach(o => others.push({x: o.x, y: o.y, width: o.w, height: o.h}));
            enemies.forEach(e => { if (e !== tank) others.push({x: e.x, y: e.y, width: TANK_WIDTH, height: TANK_HEIGHT}); });
            if (tank !== player) others.push({x: player.x, y: player.y, width: TANK_WIDTH, height: TANK_HEIGHT});
            return others;
        }

        function canMove(tank, newX, newY) {
            let tankRect = {x: newX, y: newY, width: TANK_WIDTH, height: TANK_HEIGHT};
            // Проверка границ карты
            if (newX < 0 || newX > MAP_WIDTH - TANK_WIDTH || newY < 0 || newY > MAP_HEIGHT - TANK_HEIGHT) return false;
            // Проверка на столкновение с препятствиями и другими танками
            for (let other of getCollidableObjects(tank)) {
                if (isColliding(tankRect, other)) return false;
            }
            return true;
        }

        // --- РИСОВАНИЕ ОБЪЕКТОВ ---
        function drawTank(t, isBurnt, isPlayer) {
            let inBush = false;
            bushes.forEach(b => { if(isColliding({x:t.x, y:t.y, width:TANK_WIDTH, height:TANK_HEIGHT}, b)) inBush = true; });
            
            if(isPlayer) player.isHidden = inBush;
            else t.isHidden = inBush;

            if(!isPlayer && t.isHidden) return; // Враг в кустах невидим

            ctx.save();
            ctx.translate(t.x + TANK_WIDTH/2, t.y + TANK_HEIGHT/2);
            ctx.rotate(t.dir * Math.PI / 2); // Поворот танка
            ctx.globalAlpha = (isPlayer && inBush) ? 0.4 : 1.0;

            // Корпус
            ctx.fillStyle = isBurnt ? "#111" : t.color;
            ctx.fillRect(-TANK_WIDTH/2, -TANK_HEIGHT/2, TANK_WIDTH, TANK_HEIGHT); 

            // Башня (Округлая)
            ctx.fillStyle = isBurnt ? "#000" : "#444";
            ctx.beginPath();
            ctx.arc(0, 0, TANK_WIDTH/4, 0, Math.PI * 2); // Радиус башни
            ctx.fill();
            
            // Пушка (Длиннее и из башни)
            ctx.fillStyle = "#000";
            ctx.fillRect(-2, -TANK_HEIGHT/2 - 10, 4, 15); // Пушка из башни
            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function drawObstacle(obs) {
            ctx.fillStyle = obs.color || "#554433";
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        }

        function drawBush(bush) {
            ctx.fillStyle = "rgba(20, 50, 20, 0.7)";
            ctx.fillRect(bush.x, bush.y, bush.w, bush.h);
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        function updateGameLogic() {
            // --- Движение игрока ---
            let px = player.x, py = player.y;
            if(player.moveAction === 'forward') {
                px += Math.sin(player.dir * Math.PI/2) * player.speed;
                py -= Math.cos(player.dir * Math.PI/2) * player.speed;
            } else if (player.moveAction === 'backward') {
                px -= Math.sin(player.dir * Math.PI/2) * player.speed;
                py += Math.cos(player.dir * Math.PI/2) * player.speed;
            }
            if(canMove(player, px, py)) { player.x = px; player.y = py; }

            // --- Движение врагов и AI ---
            enemies.forEach(e => {
                let currentX = e.x, currentY = e.y;
                let nextDir = e.dir;

                // AI: Если игрок виден, ехать к нему, иначе патрулировать
                let targetVisible = !player.isHidden && Math.abs(player.x - e.x) < 150 && Math.abs(player.y - e.y) < 150;
                
                if (targetVisible) {
                    // AI пытается приблизиться к игроку
                    if (Date.now() - e.lastActionTime > 500) { // Меняет направление чаще, чтобы преследовать
                        if (Math.random() < 0.5) { // 50% шанс повернуть
                             if (player.x > e.x + TANK_WIDTH / 2 && e.dir !== 1) nextDir = 1;
                             else if (player.x < e.x - TANK_WIDTH / 2 && e.dir !== 3) nextDir = 3;
                             else if (player.y > e.y + TANK_HEIGHT / 2 && e.dir !== 2) nextDir = 2;
                             else if (player.y < e.y - TANK_HEIGHT / 2 && e.dir !== 0) nextDir = 0;
                        }
                        e.lastActionTime = Date.now();
                    }
                    e.moveAction = 'forward'; // AI пытается двигаться вперед
                } else {// Патрулирование
                    if (Date.now() - e.lastActionTime > 2000) { // Меняет направление каждые 2 секунды
                        nextDir = Math.floor(Math.random()*4);
                        e.lastActionTime = Date.now();
                    }
                    e.moveAction = 'forward'; // AI пытается двигаться вперед
                }

                // Применяем движение
                let nextEX = e.x, nextEY = e.y;
                if(e.moveAction === 'forward') {
                    nextEX += Math.sin(nextDir * Math.PI/2) * e.speed;
                    nextEY -= Math.cos(nextDir * Math.PI/2) * e.speed;
                }

                if (canMove(e, nextEX, nextEY)) {
                    e.x = nextEX; e.y = nextEY; e.dir = nextDir;
                } else { 
                    e.dir = (e.dir + 1) % 4; // Если столкнулся, пробуем повернуть
                    e.lastActionTime = Date.now(); // Сброс таймера для нового решения
                }

                // Стрельба ИИ (если игрок не скрыт и не перезаряжается)
                if(targetVisible && Date.now() - e.lastShotTime > e.reloadTime) {
                    let bulletDx = Math.sin(e.dir * Math.PI/2) * 5;
                    let bulletDy = -Math.cos(e.dir * Math.PI/2) * 5;
                    bullets.push({x: e.x + TANK_WIDTH/2 -2, y: e.y + TANK_HEIGHT/2 -2, dx: bulletDx, dy: bulletDy, owner: 'enemy'});
                    e.lastShotTime = Date.now();
                }
            });

            // --- Движение и коллизии пуль ---
            bullets.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy;
                // Удаление пуль за экраном
                if(b.x < 0 || b.x > MAP_WIDTH || b.y < 0 || b.y > MAP_HEIGHT) { bullets.splice(i, 1); return; }

                if(b.owner === 'player') {
                    // Коллизия пули игрока с препятствием
                    for(let o of obstacles) {
                        if(isColliding({x:b.x, y:b.y, width:4, height:4}, {x:o.x, y:o.y, width:o.w, height:o.h})) {
                            bullets.splice(i, 1); return; // Пуля исчезает при попадании в дом
                        }
                    }
                    // Коллизия пули игрока с врагами
                    enemies.forEach((e, ei) => {
                        if(isColliding({x:b.x, y:b.y, width:4, height:4}, {x:e.x, y:e.y, width:TANK_WIDTH, height:TANK_HEIGHT})) {
                            // War Thunder пробитие: в корму (нижняя часть врага) - 100%
                            let isRearHit = (b.y > e.y + TANK_HEIGHT * 0.7); // Пример "задней" части врага (нижние 30% танка)
                            if(isRearHit || Math.random() < 0.4) { // 40% шанс пробить в лоб/бок
                                wreckage.push(enemies.splice(ei, 1)[0]); // Добавляем в обломки
                                money++; killsInRound++; document.getElementById('money').innerText = money;
                                if(killsInRound >= KILLS_FOR_NEXT_ROUND) {
                                    gameState = 'round_end';
                                    document.getElementById('play-btn').style.display = 'block';
                                }
                            }
                            bullets.splice(i, 1); // Пуля исчезает при попадании/непробитии
                        }
                    });
                } else { // Пуля врага в игрока
                    // Коллизия пули врага с препятствием
                    for(let o of obstacles) {
                        if(isColliding({x:b.x, y:b.y, width:4, height:4}, {x:o.x, y:o.y, width:o.w, height:o.h})) {
                            bullets.splice(i, 1); return; // Пуля исчезает
                        }
                    }
                    // Коллизия пули врага с игроком
                    if(isColliding({x:b.x, y:b.y, width:4, height:4}, {x:player.x, y:player.y, width:TANK_WIDTH, height:TANK_HEIGHT})) {
                        alert("ТАНК УНИЧТОЖЕН! Конец игры.");
                        location.reload(); // Перезагружаем игруnerText = round;
            document.getElementById('play-btn').style.display = 'none';
            initMap(); // Новая карта с новыми препятствиями
            spawnEnemies(); // Новые враги
            gameState = 'playing'; // Запускаем игру
            // Reset player position for new round
            player.x = MAP_WIDTH / 2 - TANK_WIDTH / 2;
            player.y = MAP_HEIGHT - TANK_HEIGHT - 10;
            player.dir = 0; // Направление вверх
            player.speed = 0;
            player.moveAction = null;
            player.reloading = false;
        }

        // --- ИНИЦИАЛИЗАЦИЯ ИГРЫ ---
        initMap(); // Создаем начальную карту
        spawnEnemies(); // Спавним первых врагов
        drawGame(); // Запускаем игровой цикл
    </script>
</body>
</html>
