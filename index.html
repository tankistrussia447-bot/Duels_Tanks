<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Duel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; background:#222; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action: none; }
        canvas { background:#4a5d23; border:4px solid #fff; width:100vw; height:60vh; }
        .ui { margin-top:10px; font-size:20px; }
        .controls { display:flex; gap:10px; margin-top:20px; }
        button { padding:20px 30px; font-size:20px; border-radius:10px; background:#444; color:white; border:none; }
        #fire { background:#b91c1c; }
    </style>
</head>
<body>
    <div class="ui">Монет: <span id="money">0</span></div>
    <canvas id="game" width="400" height="300"></canvas>
    <div class="controls">
        <button onclick="move(-20)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(20)">▶</button>
    </div>
    <button onclick="buyTank()">Купить КВ-2 (+10 монет)</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let money = localStorage.getItem('money') || 0;
        let x = 180;
        let bullets = [];
        let enemy = { x: 200, y: 50, dead: false };

        document.getElementById('money').innerText = money;

        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            // Танк
            ctx.fillStyle = 'lime';
            ctx.fillRect(x, 240, 40, 40);
            // Враг
            if(!enemy.dead) { ctx.fillStyle = 'red'; ctx.fillRect(enemy.x, enemy.y, 40, 40); }
            // Пули
            bullets.forEach((b, i) => {
                b.y -= 5;
                ctx.fillStyle = 'yellow';
                ctx.fillRect(b.x, b.y, 5, 10);
                if(b.y < enemy.y + 40 && b.x > enemy.x && b.x < enemy.x+40 && !enemy.dead) {
                    enemy.dead = true;
                    money++;
                    localStorage.setItem('money', money);
                    document.getElementById('money').innerText = money;
                    bullets.splice(i, 1);
                }
            });
            requestAnimationFrame(draw);
        }
        function move(d) { x += d; }
        function fire() { bullets.push({x: x + 17, y: 240}); }
        function buyTank() { alert("Магазин работает! Танк куплен."); }
        draw();
    </script>
</body>
</html>
