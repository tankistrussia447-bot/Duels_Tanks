<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
        canvas { background: #4a5d23; border: 4px solid #fff; width: 95vw; height: 50vh; }
        .btns { display: flex; gap: 20px; margin-top: 20px; }
        button { padding: 20px 30px; font-size: 24px; border-radius: 10px; border: none; background: #555; color: white; }
        #fire { background: #b91c1c; }
    </style>
</head>
<body>
    <canvas id="game" width="400" height="300"></canvas>
    <div class="btns">
        <button onclick="move(-10)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(10)">▶</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let x = 180;
        
        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            ctx.fillStyle = 'lime';
            ctx.fillRect(x, 240, 40, 40); // Танк
            requestAnimationFrame(draw);
        }
        function move(dir) { x += dir; }
        function fire() { alert('БАБАХ!'); }
        draw();
    </script>
</body>
</html>
