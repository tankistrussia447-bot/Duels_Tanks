<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background: linear-gradient(to bottom, #4a614c, #2e3d2f); width:100vw; height:50vh; border-bottom:2px solid #555; }
        .ui { display:flex; justify-content:space-between; width:95vw; padding:10px; font-size:18px; background:rgba(0,0,0,0.5); }
        .controls-layer { display:flex; width:100vw; height:45vh; justify-content:space-between; align-items:center; padding:10px; box-sizing:border-box; }
        
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; }
        .dpad button { background:#444; border:2px solid #666; color:white; border-radius:5px; font-size:20px; }
        .dpad .up { grid-column: 2; grid-row: 1; }
        .dpad .left { grid-column: 1; grid-row: 2; }
        .dpad .right { grid-column: 3; grid-row: 2; }
        .dpad .down { grid-column: 2; grid-row: 3; }

        .actions { display:flex; flex-direction:column; align-items:center; gap:20px; margin-right:20px; }
        #fire { background:#b91c1c; width:90px; height:90px; border-radius:50%; border:4px solid #7f1d1d; font-size:30px; box-shadow: 0 5px #450a0a; }
        #fire:active { transform: translateY(4px); box-shadow:none; }
        .shop-btn { background:#2563eb; padding:15px; border-radius:10px; border:none; color:white; }
        
        #shop-panel { display:none; position:fixed; top:5%; background:#222; border: 2px solid white; padding:20px; width:85vw; z-index:100; }
        #play-btn { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#22c55e; padding:20px; width:80vw; font-size:24px; font-weight:bold; border-radius:10px; z-index:101; }
    </style>
</head>
<body>
    <div class="ui">
        <div>💰 <span id="money">0</span> | Раунд: <span id="round">1</span></div>
        <div id="ammo-status" style="letter-spacing: 5px;">ГОТОВ 🖍️</div>
    </div>
    <canvas id="game" width="400" height="300"></canvas>

    <div class="controls-layer">
        <div class="dpad">
            <button class="up" ontouchstart="setPlayerMove('forward')" ontouchend="stopPlayerMove()">▲</button>
            <button class="left" ontouchstart="setPlayerMove('left')" ontouchend="stopPlayerMove()">◀</button>
            <button class="right" ontouchstart="setPlayerMove('right')" ontouchend="stopPlayerMove()">▶</button>
            <button class="down" ontouchstart="setPlayerMove('backward')" ontouchend="stopPlayerMove()">▼</button>
        </div>
        <div class="actions">
            <button id="fire" onclick="fire()">🔥</button>
            <button class="shop-btn" onclick="toggleShop()">🛒 МАГАЗИН</button>
        </div>
    </div>

    <div id="shop-panel" class="shop-panel"><h3>АНГАР ТЕХНИКИ</h3>
        <button onclick="buyTank('Т-26 (СССР)', 0, '#2d5a27', 2000)">Т-26 (СССР) - 0м</button><br><br>
        <button onclick="buyTank('Comet (Брит)', 20, '#d2b48c', 3000)">Comet (Брит) - 20м</button><br><br>
        <button onclick="toggleShop()">ЗАКРЫТЬ</button>
    </div>
    <button id="play-btn" onclick="startNewRound()">НАЧАТЬ РАУНД!</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let money = 0;
        let round = 1;
        let killsInRound = 0;
        const KILLS_FOR_NEXT_ROUND = 2; // Для тестов 20 много, поставил 2

        let player = {
            x: 180, y: 220, // Позиция
            color: '#2d5a27', // Цвет танка (СССР)
            direction: 0, // 0:вверх, 1:вправо, 2:вниз, 3:влево
            speed: 0, // Скорость
            reloading: false, reloadTime: 2000, // Перезарядка
            movingAction: null // 'forward', 'backward', 'left', 'right'
        };

        let bullets = [];
        let enemies = [];
        let wreckage = []; // Обломки сгоревших танков
        let obstacles = []; // Дома, кусты, стены

        // --- СОЗДАНИЕ МИРА ---
        function createWorld() {
            obstacles = [];
            // Дома
            for(let i=0; i<5; i++) obstacles.push({x: Math.random()*350, y: Math.random()*200, w: 30, h: 30, type: 'house', color: '#665544'});
            // Кусты
            for(let i=0; i<10; i++) obstacles.push({x: Math.random()*350, y: Math.random()*200, w: 20, h: 20, type: 'bush', color: '#334433'});
        }
        createWorld();

        function spawnEnemies() {
            enemies = [];
            let count = Math.floor(2 * Math.pow(1.2, round - 1)); // Врагов 2 + 20% каждый раунд
            for(let i=0; i<count; i++) {
                enemies.push({
                    x: Math.random()*300, y: Math.random()*100,
                    color: '#7c1c1c', // Цвет врага
                    direction: Math.floor(Math.random()*4),
                    speed: 1 + round*0.1,
                    reloadTime: 3000 / (1 + round*0.1), // Быстрее перезаряжаются
                    lastShotTime: Date.now(),
                    width: 40, height: 50, turretRadius: 15, gunWidth: 4, gunLength: 20
                });
            }
        }

        // --- РИСОВАНИЕ ОБЪЕКТОВ ---
        function drawTank(tank, isBurnt) {
            ctx.save();
            ctx.translate(tank.x + tank.width/2, tank.y + tank.height/2);
            ctx.rotate(tank.direction * Math.PI / 2); // Поворот танка
            
            // Корпус
            ctx.fillStyle = isBurnt ? "#111" : tank.color;
            ctx.fillRect(-tank.width/2, -tank.height/2, tank.width, tank.height); 

            // Башня (Округлая)
            ctx.fillStyle = isBurnt ? "#000" : "#444";
            ctx.beginPath();
            ctx.arc(0, 0, tank.turretRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Пушка (Длиннее и из башни)
            ctx.fillStyle = "#000";
            ctx.fillRect(-tank.gunWidth/2, -tank.height/2 - tank.gunLength + 10, tank.gunWidth, tank.gunLength); // +10 чтобы пушка выходила из башни
            ctx.restore();
        }

        function drawObstacle(obs) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        function update() {
            // --- Движение игрока ---
            if(player.movingAction === 'forward') {
                player.x += Math.cos(player.direction * Math.PI / 2 - Math.PI/2) * player.speed;
                player.y += Math.sin(player.direction * Math.PI / 2 - Math.PI/2) * player.speed;
            } else if (player.movingAction === 'backward') {
                player.x -= Math.cos(player.direction * Math.PI / 2 - Math.PI/2) * player.speed;
                player.y -= Math.sin(player.direction * Math.PI / 2 - Math.PI/2) * player.speed;
            }

            // Границы поля для игрока
            if(player.x < 0) player.x = 0; if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            if(player.y < 0) player.y = 0; if(player.y > canvas.height - player.height) player.y = canvas.height - player.height;

            // --- Движение врагов и AI ---
            enemies.forEach(e => {
                // Движение
                if(Math.random() < 0.02) e.direction = Math.floor(Math.random()*4); // Случайный поворот
                e.x += Math.cos(e.direction * Math.PI / 2 - Math.PI/2) * e.speed;
                e.y += Math.sin(e.direction * Math.PI / 2 - Math.PI/2) * e.speed;
                
                // Границы поля для врагов (и отскок)
                if(e.x < 0 || e.x > canvas.width - e.width) e.direction = (e.direction + 2) % 4; // Разворот на 180
                if(e.y < 0 || e.y > canvas.height/2 - e.height) e.direction = (e.direction + 2) % 4; // Разворот на 180 (только в верхней половине)

                // Стрельба ИИ
                if(Date.now() - e.lastShotTime > e.reloadTime) {
                    let bulletDx = Math.cos(e.direction * Math.PI / 2 - Math.PI/2) * 5;
                    let bulletDy = Math.sin(e.direction * Math.PI / 2 - Math.PI/2) * 5;
                    bullets.push({x: e.x+e.width/2-2, y: e.y+e.height/2-2, dx: bulletDx, dy: bulletDy, owner: 'enemy'});
                    e.lastShotTime = Date.now();
                }
            });

            // --- Движение и коллизии пуль ---
            bullets.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy;
                // Удаление пуль за экраном
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) { bullets.splice(i, 1); return; }

                if(b.owner === 'player') {
                    enemies.forEach((e, ei) => {
                        if(b.x > e.x && b.x < e.x+e.width && b.y > e.y && b.y < e.y+e.height) {
                            // War Thunder пробитие
                            let isRearHit = (b.x > e.x && b.x < e.x + e.width && b.y > e.y + e.height / 2); // Пример "задней" части врага
                            if(isRearHit || Math.random() < 0.4) { // 40% шанс пробить в лоб/бок
                                wreckage.push(enemies.splice(ei, 1)[0]);
                                money++; killsInRound++; document.getElementById('money').innerText = money;
                                if(killsInRound >= KILLS_FOR_NEXT_ROUND) {
                                    document.getElementById('play-btn').style.display = 'block';
                                }
                            }
                            bullets.splice(i, 1);
                        }
                    });
                } else { // Пуля врага в игрока
                    if(b.x > player.x && b.x < player.x+player.width && b.y > player.y && b.y < player.y+player.height) {
                        alert("ГАРЬ! ТЕБЯ ПОДБИЛИ! Конец игры.");
                        location.reload(); // Перезагружаем игру при смерти
                    }
                }
            });
        }

        // --- ГЛАВНЫЙ ЦИКЛ РИСОВАНИЯ ---
        function drawGame() {
            ctx.clearRect(0, 0, 400, 300);
            
            // Рисуем декорации
            obstacles.forEach(o => drawObstacle(o));

            // Рисуем подбитые танки
            wreckage.forEach(w => drawTank(w, true));

            // Рисуем живые танки
            enemies.forEach(e => drawTank(e, false));
            drawTank(player, false);

            // Рисуем пули
            ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 8));

            if(document.getElementById('play-btn').style.display !== 'block') { // Только если не ждем следующий раунд
                 update();
            }
            requestAnimationFrame(drawGame);
        }

        // --- УПРАВЛЕНИЕ ИГРОКОМ ---
        function setPlayerMove(action) {
            player.movingAction = action;
            player.speed = 2; // Скорость для движения
            if(action === 'left') player.direction = (player.direction + 3) % 4; // Поворот на 90влево
            if(action === 'right') player.direction = (player.direction + 1) % 4; // Поворот на 90 вправо
        }
        function stopPlayerMove() { player.speed = 0; player.movingAction = null; }

        function fire() {
            if(!player.reloading) {
                // Создаем пулю в направлении игрока
                let bulletDx = Math.cos(player.direction * Math.PI / 2 - Math.PI/2) * 7;
                let bulletDy = Math.sin(player.direction * Math.PI / 2 - Math.PI/2) * 7;
                bullets.push({x: player.x+player.width/2-2, y: player.y+player.height/2-2, dx: bulletDx, dy: bulletDy, owner: 'player'});
                
                player.reloading = true; document.getElementById('ammo-status').innerText = "ПЕРЕЗАРЯДКА 🔄";
                setTimeout(() => { player.reloading = false; document.getElementById('ammo-status').innerText = "ГОТОВ 🖍️"; }, player.reloadTime);
            }
        }

        function toggleShop() {
            let s = document.getElementById('shop-panel');
            if(s.style.display === 'block') { s.style.display = 'none'; drawGame(); } // Закрываем магазин и продолжаем игру
            else { s.style.display = 'block'; cancelAnimationFrame(drawGame); } // Открываем магазин и ставим игру на паузу
        }

        function buyTank(name, price, color, reload) {
            if(money >= price) {
                money -= price; player.color = color; player.reloadTime = reload;
                document.getElementById('money').innerText = money;
                document.getElementById('tank-name').innerText = name;
                toggleShop(); // Закрыть магазин после покупки
            }
        }

        function startNewRound() {
            round++; killsInRound = 0; wreckage = [];
            document.getElementById('round').innerText = round;
            document.getElementById('play-btn').style.display = 'none';
            spawnEnemies(); // Новые враги
            drawGame(); // Продолжаем игру
        }

        // --- ИНИЦИАЛИЗАЦИЯ ИГРЫ ---
        player.width = 40; player.height = 50; player.turretRadius = 15; player.gunWidth = 4; player.gunLength = 20; // Размеры для игрока
        drawGame(); // Запускаем игровой цикл
    </script>
</body>
</html>
