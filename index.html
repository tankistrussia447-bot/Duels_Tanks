<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#222; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background:#4a5d23; width:100vw; height:50vh; border:4px solid #fff; margin-top:5px; }
        .ui { font-size:16px; margin: 5px; }
        .shop-panel { position:fixed; top:5%; background:#333; padding:15px; border-radius:15px; width:85vw; height:80vh; overflow-y:auto; text-align:center; display:none; }
        button { padding:12px; font-size:14px; margin:5px; border-radius:8px; border:none; background:#444; color:white; }
        #fire { background:#b91c1c; width: 80px; height: 80px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="ui">Монет: <span id="money">0</span> | Танк: <span id="tank-name">МС-1</span> | Урон: <span id="dmg">1</span></div>
    <canvas id="game" width="400" height="300"></canvas>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="move(-20)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(20)">▶</button>
    </div>
    <button onclick="toggleShop()">🛒 МАГАЗИН</button>

    <div id="shop-panel" class="shop-panel">
        <h3>ТАНКИ И МОДУЛИ</h3>
        <button onclick="buyTank('КВ-2', 20, 1, 5, false)">КВ-2 (Цена: 20)</button>
        <button onclick="buyTank('СТ-2', 40, 2, 10, false)">СТ-2 (2 пушки! Цена: 40)</button>
        <button onclick="buyUpgrade('Дульник', 10)">Улучшить ствол (Дульник) - 10м</button>
        <button onclick="toggleShop()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const ctx = document.getElementById('game').getContext('2d');
        let player = { x: 180, money: 100, dmg: 1, guns: 1, hasMuzzle: false, color: '#555' };
        let bullets = [], enemies = [{x: 100, y: 50, hp: 3}];

        function drawTank() {
            ctx.fillStyle = player.color; ctx.fillRect(player.x, 220, 60, 40); // Корпус
            ctx.fillStyle = '#333'; ctx.fillRect(player.x+15, 205, 30, 30); // Башня
            for(let i=0; i<player.guns; i++) {
                ctx.fillRect(player.x+10 + i*25, 180, 8, 30); // Стволы
                if(player.hasMuzzle) ctx.fillRect(player.x+5 + i*25, 175, 18, 10); // Дульник ("бутылка")
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            drawTank(player.x, 220);
            enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y, 40, 40); });
            bullets.forEach((b, i) => {
                b.y -= 5; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 10);
                enemies.forEach((e, ei) => {
                    if(b.y < e.y+40 && b.x > e.x && b.x < e.x+40) {
                        e.hp -= player.dmg; bullets.splice(i, 1);
                        if(e.hp <= 0) { enemies.splice(ei, 1); player.money++; document.getElementById('money').innerText = player.money; }
                    }
                });
            });
            requestAnimationFrame(draw);
        }

        function buyTank(name, price, guns, dmg) {
            if(player.money >= price) { player.money -= price; player.guns = guns; player.dmg = dmg; 
            document.getElementById('tank-name').innerText = name; updateUI(); }
        }
        function buyUpgrade(name, price) {
            if(player.money >= price) { player.money -= price; player.hasMuzzle = true; updateUI(); }
        }
        function updateUI() { document.getElementById('money').innerText = player.money; document.getElementById('dmg').innerText = player.dmg; }
        function move(d) { player.x += d; }
        function fire() { bullets.push({x: player.x+20, y: 220}); }
        function toggleShop() { document.getElementById('shop-panel').style.display = (document.getElementById('shop-panel').style.display === 'block') ? 'none' : 'block'; }
        draw();
    </script>
</body>
</html>
