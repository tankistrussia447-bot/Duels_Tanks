<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#222; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background:#4a5d23; width:95vw; height:50vh; border:4px solid #fff; margin-top:10px; }
        #hp-container { width: 90vw; height: 20px; background: #555; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #dc2626; transition: width 0.3s; }
        .controls { display:flex; gap:10px; margin-top:10px; }
        button { padding:20px; font-size:20px; border-radius:10px; border:none; background:#444; color:white; }
        #fire { background:#b91c1c; }
    </style>
</head>
<body>
    <div class="ui">Монет: <span id="money">0</span></div>
    <div id="hp-container"><div id="hp-bar"></div></div>
    
    <canvas id="game" width="400" height="300"></canvas>
    
    <div class="controls">
        <button onclick="move(-20)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(20)">▶</button>
    </div>

    <script>
        const ctx = document.getElementById('game').getContext('2d');
        let player = { x: 180, y: 240, hp: 100, money: 0 };
        let bullets = [], eBullets = [];
        let enemies = [{ x: 50, y: 50 }, { x: 150, y: 50 }, { x: 250, y: 50 }];

        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            // Танк игрока
            ctx.fillStyle = 'lime'; ctx.fillRect(player.x, player.y, 40, 40);
            
            // Враги
            ctx.fillStyle = 'red';
            enemies.forEach(e => {
                ctx.fillRect(e.x, e.y, 40, 40);
                if(Math.random() < 0.02) eBullets.push({x: e.x+20, y: e.y+40});
            });

            // Пули игрока
            bullets.forEach((b, i) => {
                b.y -= 5;
                ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 10);
                enemies.forEach((e, ei) => {
                    if(b.y < e.y+40 && b.x > e.x && b.x < e.x+40) {
                        enemies.splice(ei, 1); bullets.splice(i, 1);
                        player.money++; document.getElementById('money').innerText = player.money;
                    }
                });
            });

            // Пули врагов
            eBullets.forEach((b, i) => {
                b.y += 3;
                ctx.fillStyle = 'orange'; ctx.fillRect(b.x, b.y, 5, 10);
                if(b.y > player.y && b.y < player.y+40 && b.x > player.x && b.x < player.x+40) {
                    player.hp -= 10;
                    document.getElementById('hp-bar').style.width = player.hp + "%";
                    eBullets.splice(i, 1);
                    if(player.hp <= 0) { alert("ТАНК УНИЧТОЖЕН!"); location.reload(); }
                }
            });
            requestAnimationFrame(draw);
        }

        function move(d) { player.x += d; }
        function fire() { bullets.push({x: player.x+20, y: player.y}); }
        draw();
    </script>
</body>
</html>
