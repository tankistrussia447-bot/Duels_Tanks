<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background: #3d523d; width:100vw; height:50vh; border-bottom:2px solid #555; }
        .ui { display:flex; justify-content:space-between; width:95vw; padding:8px; font-size:14px; background:rgba(0,0,0,0.5); }
        .controls-layer { display:flex; width:100vw; height:45vh; justify-content:space-between; align-items:center; padding:10px; box-sizing:border-box; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; }
        .dpad button { background:#444; border:1px solid #666; color:white; border-radius:5px; font-size:18px; }
        .dpad .up { grid-column: 2; grid-row: 1; }
        .dpad .left { grid-column: 1; grid-row: 2; }
        .dpad .right { grid-column: 3; grid-row: 2; }
        .dpad .down { grid-column: 2; grid-row: 3; }
        #fire { background:#b91c1c; width:85px; height:85px; border-radius:50%; font-size:25px; border:4px solid #7f1d1d; }
        #shop-panel, #play-btn { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; border: 2px solid white; padding:20px; width:80vw; z-index:100; text-align:center; }
    </style>
</head>
<body>
    <div class="ui">
        <div>💰 <span id="money">0</span> | Раунд: <span id="round">1</span></div>
        <div id="ammo-status">ГОТОВ 🖍️</div>
    </div>
    <canvas id="game" width="400" height="300"></canvas>

    <div class="controls-layer">
        <div class="dpad">
            <button class="up" ontouchstart="setMove('forward')" ontouchend="stopMove()">▲</button>
            <button class="left" ontouchstart="rotate(3)" ontouchend="stopMove()">◀</button>
            <button class="right" ontouchstart="rotate(1)" ontouchend="stopMove()">▶</button>
            <button class="down" ontouchstart="setMove('backward')" ontouchend="stopMove()">▼</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button id="fire" onclick="fire()">🔥</button>
            <button onclick="toggleShop()" style="background:#2563eb; color:white; border:none; padding:10px; border-radius:5px;">🛒</button>
        </div>
    </div>

    <div id="shop-panel">
        <h3>МАГАЗИН</h3>
        <button onclick="buyTank('Comet', 10, '#d2b48c', 1.5)">Comet (10м)</button><br><br>
        <button onclick="toggleShop()">ЗАКРЫТЬ</button>
    </div>
    <button id="play-btn" onclick="startNewRound()">СЛЕДУЮЩИЙ РАУНД</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let money = 0, round = 1, kills = 0, gameState = 'playing';
        const T_W = 24, T_H = 30; // Уменьшенный масштаб на 40%

        let player = { x: 180, y: 220, dir: 0, color: '#2d5a27', reloading: false, move: null, isHidden: false };
        let enemies = [], wreckage = [], bullets = [], obstacles = [], bushes = [];

        function initMap() {obstacles = [
                {x: 50, y: 100, w: 40, h: 40, type: 'house'},
                {x: 300, y: 50, w: 40, h: 40, type: 'house'}
            ];
            bushes = [
                {x: 150, y: 120, w: 60, h: 40},
                {x: 20, y: 200, w: 60, h: 40}
            ];
            spawnEnemies();
        }

        function spawnEnemies() {
            enemies = [];
            for(let i=0; i < (1 + round); i++) {
                enemies.push({ x: Math.random()*350, y: 20, dir: 2, color: '#7c1c1c', lastShot: 0, isHidden: false });
            }
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y;
        }

        function checkAllCollisions(newX, newY) {
            let pRect = {x: newX, y: newY, w: T_W, h: T_H};
            for(let o of obstacles) if(isColliding(pRect, o)) return true;
            for(let e of enemies) if(isColliding(pRect, {x:e.x, y:e.y, w:T_W, h:T_H})) return true;
            return false;
        }

        function drawTank(t, isBurnt, isPlayer) {
            let inBush = false;
            bushes.forEach(b => { if(isColliding({x:t.x, y:t.y, w:T_W, h:T_H}, b)) inBush = true; });
            
            if(isPlayer) player.isHidden = inBush;
            else t.isHidden = inBush;

            if(!isPlayer && t.isHidden) return; // Враг в кустах невидим

            ctx.save();
            ctx.translate(t.x + T_W/2, t.y + T_H/2);
            ctx.rotate(t.dir * Math.PI / 2);
            ctx.globalAlpha = (isPlayer && inBush) ? 0.4 : 1.0;

            ctx.fillStyle = isBurnt ? "#111" : t.color;
            ctx.fillRect(-T_W/2, -T_H/2, T_W, T_H);
            ctx.fillStyle = isBurnt ? "#000" : "#444";
            ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
            ctx.fillStyle = "#000"; ctx.fillRect(-2, -T_H/2 - 5, 4, 15);
            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function update() {
            if(gameState !== 'playing') return;

            let speed = 2;
            let nextX = player.x, nextY = player.y;

            if(player.move === 'forward') {
                nextX += Math.sin(player.dir * Math.PI/2) * speed;
                nextY -= Math.cos(player.dir * Math.PI/2) * speed;
            }
            if(player.move === 'backward') {
                nextX -= Math.sin(player.dir * Math.PI/2) * speed;
                nextY += Math.cos(player.dir * Math.PI/2) * speed;
            }

            if(!checkAllCollisions(nextX, nextY)) {
                player.x = nextX; player.y = nextY;
            }

            enemies.forEach(e => {
                let oldX = e.x, oldY = e.y;
                e.x += Math.sin(e.dir * Math.PI/2) * 1;
                e.y -= Math.cos(e.dir * Math.PI/2) * 1;
                if(checkAllCollisions(e.x, e.y) || e.x < 0 || e.x > 380 || e.y < 0 || e.y > 280) {
                    e.x = oldX; e.y = oldY; e.dir = Math.floor(Math.random()*4);
                }
                if(!player.isHidden && Math.random() < 0.01) {
                     bullets.push({x: e.x+T_W/2, y: e.y+T_H/2, dx: Math.sin(e.dir*Math.PI/2)*4, dy: -Math.cos(e.dir*Math.PI/2)*4, owner: 'enemy'});
                }
            });

            bullets.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy;
                if(b.owner === 'player') {
                    enemies.forEach((e, ei) => {
                        if(isColliding({x:b.x, y:b.y, w:4, h:4}, {x:e.x, y:e.y, w:T_W, h:T_H})) {
                            wreckage.push(enemies.splice(ei, 1)[0]);
                            money++; kills++; document.getElementById('money').innerText = money;
                            bullets.splice(i, 1);
                        }
                    });
                } else if(isColliding({x:b.x, y:b.y, w:4, h:4}, {x:player.x, y:player.y, w:T_W, h:T_H})) {
                    alert("ТАНК УНИЧТОЖЕН!"); location.reload();
                }
            });}

        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            bushes.forEach(b => { ctx.fillStyle = "rgba(20, 50, 20, 0.7)"; ctx.fillRect(b.x, b.y, b.w, b.h); });
            obstacles.forEach(o => { ctx.fillStyle = "#554433"; ctx.fillRect(o.x, o.y, o.w, o.h); });
            wreckage.forEach(w => drawTank(w, true, false));
            enemies.forEach(e => drawTank(e, false, false));
            drawTank(player, false, true);
            ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
            update();
            requestAnimationFrame(draw);
        }

        function setMove(m) { player.move = m; }
        function rotate(d) { player.dir = d; }
        function stopMove() { player.move = null; }
        function fire() {
            if(!player.reloading) {
                bullets.push({x: player.x+T_W/2, y: player.y+T_H/2, dx: Math.sin(player.dir*Math.PI/2)*6, dy: -Math.cos(player.dir*Math.PI/2)*6, owner: 'player'});
                player.reloading = true; setTimeout(() => player.reloading = false, 1500);
            }
        }
        function toggleShop() { let s = document.getElementById('shop-panel'); s.style.display = (s.style.display==='block')?'none':'block'; }
        
        initMap();
        draw();
    </script>
</body>
</html>
