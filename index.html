<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#222; display:flex; flex-direction:column; align-items:center; height:100vh; color:white; font-family:sans-serif; touch-action:none; }
        canvas { background:#4a5d23; width:100vw; height:50vh; border:4px solid #fff; margin-top:5px; }
        .ui { font-size:18px; margin: 5px; }
        #shop { display:none; position:fixed; top:5%; background:#333; padding:15px; border-radius:15px; width:85vw; height:80vh; overflow-y:auto; text-align:center; }
        button { padding:15px; font-size:16px; margin:5px; border-radius:10px; border:none; background:#444; color:white; width: 90%; }
        #fire { background:#b91c1c; width: 100px; height: 100px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="ui">Монет: <span id="money">0</span> | Танк: <span id="tank-name">МС-1</span> | HP: <span id="hp">100</span></div>
    <canvas id="game" width="400" height="300"></canvas>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="move(-20)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(20)">▶</button>
    </div>

    <div id="shop">
        <h3>МАГАЗИН (Выбери танк)</h3>
        <div id="tank-list"></div>
    </div>

    <script>
        // БАЗА ТАНКОВ (Добавляй сюда сколько хочешь)
        const tanksDB = [
            {name: 'МС-1', price: 0, damage: 1, color: '#555'},
            {name: 'Т-26', price: 3, damage: 2, color: '#4a5d23'},
            {name: 'Комета', price: 10, damage: 5, color: '#3d5a37'},
            {name: 'КВ-2', price: 20, damage: 10, color: '#2d4a27'},
            {name: 'КВ-6', price: 50, damage: 25, color: '#1a2a1a'},
            {name: 'Абрамс', price: 100, damage: 50, color: '#888'}
        ];

        let money = parseInt(localStorage.getItem('money')) || 0;
        let player = { x: 180, hp: 100, dmg: 1, color: '#555' };
        let bullets = [], enemies = [], round = 1, state = 'playing';

        function spawn() { enemies = []; for(let i=0; i<round; i++) enemies.push({x: 20+i*80, y: 30, hp: round*2}); }
        spawn();

        const ctx = document.getElementById('game').getContext('2d');
        function draw() {
            if(state !== 'playing') return;
            ctx.clearRect(0, 0, 400, 300);
            ctx.fillStyle = player.color; ctx.fillRect(player.x, 240, 40, 40);
            enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y, 40, 40); });
            bullets.forEach((b, i) => {
                b.y -= 5; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 10);
                enemies.forEach((e, ei) => {
                    if(b.y < e.y+40 && b.x > e.x && b.x < e.x+40) {
                        e.hp -= player.dmg; bullets.splice(i, 1);
                        if(e.hp <= 0) { enemies.splice(ei, 1); money++; updateUI(); }
                    }
                });
            });
            if(enemies.length === 0) showShop();
            requestAnimationFrame(draw);
        }

        function showShop() {
            state = 'shop'; document.getElementById('shop').style.display = 'block';
            let list = document.getElementById('tank-list'); list.innerHTML = '';
            tanksDB.forEach(t => {
                list.innerHTML += `<button onclick="buy('${t.name}', ${t.price}, ${t.damage}, '${t.color}')">${t.name} (Урон: ${t.damage}, Цена:${t.price})</button>`;
            });
        }

        function buy(name, price, dmg, color) {
            if(money >= price) { money -= price; player.dmg = dmg; player.color = color;
            document.getElementById('tank-name').innerText = name; updateUI(); 
            state = 'playing'; document.getElementById('shop').style.display = 'none'; spawn(); draw(); }
        }

        function updateUI() { document.getElementById('money').innerText = money; localStorage.setItem('money', money); }
        function move(d) { player.x += d; }
        function fire() { bullets.push({x: player.x+20, y: 240}); }
        draw();
    </script>
</body>
</html>
