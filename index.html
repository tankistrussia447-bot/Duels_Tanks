<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Duel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { background: #4a5d23; border: 4px solid #fff; width: 100vw; height: 60vh; }
        #controls { margin-top: 10px; display: flex; justify-content: space-around; width: 100%; padding: 0 20px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; }
        .btn { background: #444; color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; }
        #fire-btn { width: 100px; height: 100px; border-radius: 50%; background: #dc2626; font-size: 18px; }
    </style>
</head>
<body>

<canvas id="canvas" width="800" height="400"></canvas>

<div id="controls">
    <div class="d-pad">
        <button class="btn" style="grid-column: 2; grid-row: 1;" ontouchstart="move('up')">▲</button>
        <button class="btn" style="grid-column: 1; grid-row: 2;" ontouchstart="move('left')">◀</button>
        <button class="btn" style="grid-column: 3; grid-row: 2;" ontouchstart="move('right')">▶</button>
        <button class="btn" style="grid-column: 2; grid-row: 3;" ontouchstart="move('down')">▼</button>
    </div>
    <button id="fire-btn" onclick="fire()">ОГОНЬ!</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let player = { x: 50, y: 200, w: 40, h: 40, color: '#00ff00' };
    let bullets = [];

    function move(dir) {
        if(dir === 'up') player.y -= 20;
        if(dir === 'down') player.y += 20;
        if(dir === 'left') player.x -= 20;
        if(dir === 'right') player.x += 20;
    }

    function fire() {
        bullets.push({ x: player.x + 40, y: player.y + 20, speed: 10 });
        document.getElementById('fire-btn').style.display = 'none';
        setTimeout(() => { document.getElementById('fire-btn').style.display = 'block'; }, 2000);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = 'yellow';
        bullets.forEach(b => {
            b.x += b.speed;
            ctx.fillRect(b.x, b.y, 10, 5);
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
