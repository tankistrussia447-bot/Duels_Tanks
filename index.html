<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; background:#111; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; color:white; font-family:sans-serif; }
        canvas { background: linear-gradient(to bottom, #4a614c, #2e3d2f); width:100vw; height:55vh; border-bottom:4px solid #fff; }
        .ui { display:flex; justify-content:space-between; width:90vw; padding:10px; font-size:18px; }
        .controls { display:flex; gap:15px; margin-top:20px; }
        button { padding:20px; font-size:20px; border-radius:10px; border:none; background:#444; color:white; }
        #fire { background:#b91c1c; width: 90px; height: 90px; border-radius: 50%; }
        #shop-panel { display:none; position:fixed; top:10%; background:#222; border: 2px solid white; padding:20px; width:80vw; }
    </style>
</head>
<body>
    <div class="ui">
        <div>Монет: <span id="money">0</span> | Танк: <span id="tank-name">Т-26</span></div>
        <div id="ammo">🖍️🖍️🖍️</div>
    </div>
    <canvas id="game" width="400" height="300"></canvas>
    <div class="controls">
        <button onclick="move(-20)">◀</button>
        <button id="fire" onclick="fire()">🔥</button>
        <button onclick="move(20)">▶</button>
        <button onclick="toggleShop()">🛒</button>
    </div>

    <div id="shop-panel" class="shop-panel">
        <h3>АНГАР</h3>
        <button onclick="buyTank('Т-26 (СССР)', 0, '#2d5a27')">Т-26 (СССР)</button>
        <button onclick="buyTank('Comet (UK)', 20, '#d2b48c')">Comet (Брит)</button>
        <button onclick="toggleShop()">Назад</button>
    </div>

    <script>
        const ctx = document.getElementById('game').getContext('2d');
        let player = { x: 170, money: 0, color: '#2d5a27', ammo: 3, reloading: false };
        let bullets = [], enemies = [{x: 100, y: 50, hp: 2}];

        function drawTank(x, y, color) {
            ctx.fillStyle = color; ctx.fillRect(x, 220, 60, 40); // Корпус
            ctx.fillStyle = '#444'; ctx.fillRect(x+15, 205, 30, 25); // Башня
            ctx.fillStyle = '#000'; ctx.fillRect(x+25, 185, 10, 25); // Пушка
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 300);
            drawTank(player.x, 220, player.color);
            enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y, 40, 40); });
            bullets.forEach((b, i) => {
                b.y -= 7; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 10);
                enemies.forEach((e, ei) => {
                    if(b.y < e.y+40 && b.x > e.x && b.x < e.x+40) {
                        enemies.splice(ei, 1); bullets.splice(i, 1);
                        player.money++; document.getElementById('money').innerText = player.money;
                    }
                });
            });
            if(enemies.length === 0) enemies.push({x: Math.random()*300, y: 50, hp: 2});
            requestAnimationFrame(draw);
        }

        function fire() {
            if(player.ammo > 0 && !player.reloading) {
                bullets.push({x: player.x+27, y: 220});
                player.ammo--;
                document.getElementById('ammo').innerText = "🖍️".repeat(player.ammo);
                if(player.ammo === 0) reload();
            }
        }

        function reload() {
            player.reloading = true;
            document.getElementById('ammo').innerText = "🔄";
            setTimeout(() => { player.ammo = 3; player.reloading = false; document.getElementById('ammo').innerText = "🖍️🖍️🖍️"; }, 2000);
        }

        function buyTank(name, price, color) {
            if(player.money >= price) { player.money -= price; player.color = color; document.getElementById('tank-name').innerText = name; document.getElementById('money').innerText = player.money; toggleShop(); }
        }

        function toggleShop() { document.getElementById('shop-panel').style.display = (document.getElementById('shop-panel').style.display === 'block') ? 'none' : 'block'; }
        function move(d) { player.x += d; }
        draw();
    </script>
</body>
</html>
