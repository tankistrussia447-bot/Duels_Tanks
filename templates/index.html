<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Duel</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { background: #4a5d23; border: 4px solid #fff; width: 90vw; height: 40vh; }
        #controls { position: absolute; bottom: 20px; display: flex; gap: 20px; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 10px; border: none; font-weight: bold; color: white; }
        #aim-btn { background: #f59e0b; }
        #fire-btn { background: #ef4444; display: none; }
    </style>
</head>
<body>

    <canvas id="canvas" width="800" height="400"></canvas>
    <div id="controls">
        <button id="aim-btn">🎯 ПРИЦЕЛ</button>
        <button id="fire-btn">🔥 ОГОНЬ!</button>
    </div>

    <!-- Библиотека связи с сервером -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const aimBtn = document.getElementById('aim-btn');
        const fireBtn = document.getElementById('fire-btn');
        let startTime = 0;

        aimBtn.onclick = () => {
            startTime = Date.now();
            aimBtn.innerText = "Целюсь...";
            setTimeout(() => {
                fireBtn.style.display = 'block';
                aimBtn.style.display = 'none';
            }, 2000);
        };

        fireBtn.onclick = () => {
            const timeDiff = Date.now() - startTime;
            if (timeDiff >= 2000) {
                alert("БАБАХ! Попадание!");
            } else {
                alert("❌ Рикошет! Рано стрелял!");
            }
            location.reload();
        };
    </script>
</body>
                                       </html>
